<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATS Toolbox - Home</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>

  <body>
    <!-- Navbar -->
    <div id="navbar-placeholder"></div>
    <div class="container mt-5">
      <h1>Welcome to ATS Toolbox</h1>
      <p>
        This is the main page where you can find important information and links
      </p>
      <h3>Important Info:</h3>
      <div class="card-container row" id="card-container-main"></div>
    </div>
    <!-- Offcanvas -->
    <div id="offcanvas-placeholder"></div>
    <script>
      // Load navbar and offcanvas components
      fetch("ca-ats-team.github.io/components/_navbar.html")
        .then((response) => response.text())
        .then((data) => {
          document.getElementById("navbar-placeholder").innerHTML = data;
          console.log("***_navbar loaded");
          navbarInit()
        });
      fetch("ca-ats-team.github.io/components/_offcanvas.html")
        .then((response) => response.text())
        .then((data) => {
          document.getElementById("offcanvas-placeholder").innerHTML = data;
          console.log("***_offcanvas loaded");
        });
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
    <script src="./js/dbPromise.js"></script>
    <script src="./js/notemaker.js"></script>
    <script src="./js/main.js"></script>
  </body>
</html>
