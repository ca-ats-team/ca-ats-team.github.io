<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATS Toolbox - My Portal</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <div class="container">
      <h1>Trouble Detail</h1>
      <div class="detail-section" id="troubleDetailContainer">
        <h2>Issue Description</h2>
        <p>Details about the trouble ticket will be displayed here.</p>
      </div>
      <button onclick="goBack()">Back</button>
    </div>
    <script>
      window.addEventListener("load", async () => {
        const urlParams = new URLSearchParams(window.location.search);
        const troubleId = urlParams.get("id");
        console.log("onload Trouble ID:" + troubleId);
        // Fetch and display trouble details using troubleId
        await fetchTroubleDetails(troubleId);
      });

      function goBack() {
        window.history.back();
      }
    </script>
    <script src="js/dbPromise.js"></script>
    <script src="js/notemaker.js"></script>
    <script src="js/main.js"></script>
    <script src="js/troubles.js"></script>
  </body>
</html>
