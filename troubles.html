<!doctype html>

<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ATS Toolbox - My Portal</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/choices.js/public/assets/styles/choices.min.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
    <link rel="stylesheet" href="./css/styles.css" />
  </head>

  <body>
    <!-- Navbar -->
    <div id="navbar-placeholder"></div>
    <div class="container mt-5">
      <h2>Trouble Tickets</h2>
      <div class="mb-3">
        <input type="text" class="form-control" id="troubleSearch" placeholder="Search trouble tickets..." />
        <button class="btn btn-primary mt-2" id="troubleSearchBtn">Search</button>
        <button class="btn btn-primary mt-2" id="troubleResetBtn">Reset</button>
      </div>

      <p class="fs-3 text-body-secondary">
        List of trouble tickets are found below.
      </p>
      <div class="card-container row" id="card-container-trouble-list"></div>
      <div class="d-flex justify-content-between">
        <button
          id="prevBtn"
          class="btn btn-secondary"
          onclick="troublesButton('prevBtn')">
          Previous
        </button>
        <span class="align-self-center" id="pageIndicator"></span>
        <button
          id="nextBtn"
          class="btn btn-primary"
          onclick="troublesButton('nextBtn')">
          Next
        </button>
        
      </div>
    </div>
    <!-- Offcanvas -->
    <div id="offcanvas-placeholder"></div>
  </body>
  
  <script>
    // Load navbar and offcanvas components
    fetch("components/_navbar.html")
      .then((response) => response.text())
      .then((data) => {
        document.getElementById("navbar-placeholder").innerHTML = data;
        console.log("***_navbar loaded");
        navbarInit();
      });
    fetch("components/_offcanvas.html")
      .then((response) => response.text())
      .then((data) => {
        document.getElementById("offcanvas-placeholder").innerHTML = data;
        console.log("***_offcanvas loaded");
      });
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/choices.js/public/assets/scripts/choices.min.js"></script>
  <script src="./js/dbPromise.js"></script>
  <script src="./js/notemaker.js"></script>
  <script src="./js/main.js"></script>
  <script src="./js/troubles.js"></script>
</html>
